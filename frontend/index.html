<!DOCTYPE html>
<html>
<head>
  <title>AI Industrial Defect Dashboard</title>

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  🏭 AI Industrial Defect Detection System
</div>

<!-- MAIN WRAPPER -->
<div class="wrapper">

  <!-- LEFT PANEL -->
  <div class="panel left">

    <h2>📤 Upload Section</h2>

    <input type="file" id="fileInput" accept="image/*">

    <img id="preview" class="preview" />

    <button onclick="upload()">Run Detection</button>

    <div class="result-box">
      <p>Status: <span id="statusText">---</span></p>
      <p>Confidence: <span id="confidence">0</span></p>
    </div>

    <h3>Defects</h3>
    <ul id="defectList"></ul>

  </div>

  <!-- RIGHT PANEL -->
  <div class="panel right">

    <h2>📊 Analytics Dashboard</h2>

    <canvas id="chart"></canvas>

    <div class="stats" id="stats">---</div>

    <div class="buttons">
      <a href="http://127.0.0.1:8000/export/excel">⬇ Excel</a>
      <a href="http://127.0.0.1:8000/export/pdf">⬇ PDF</a>
    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
